name: 构建Linux版本
on:
  pull_request:
  push:
    branches: [ci, master, latest, 3.3-stable]
  workflow_dispatch:

permissions:
  statuses: write
  contents: read

jobs:
  build-linux-clang:
    name: Linux Clang构建
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CC: clang
      CFLAGS: -Werror
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libwayland-dev libxkbcommon-dev
          sudo apt install -y fakeroot dpkg-dev debhelper cmake build-essential

      - name: 配置Wayland后端
        run: cmake -S . -B build -D GLFW_BUILD_WAYLAND=ON -D BUILD_SHARED_LIBS=ON -D GLFW_BUILD_EXAMPLES=OFF -D GLFW_BUILD_TESTS=OFF -D GLFW_BUILD_DOCS=OFF

      - name: 编译项目
        run: cmake --build build --parallel 4

      - name: 安装到临时目录
        run: |
          mkdir -p package/usr/local
          DESTDIR=package cmake --install build

      - name: 创建DEBIAN控制文件
        run: |
          mkdir -p package/DEBIAN
          cat << 'EOF' > package/DEBIAN/control
          Package: glfw-wayland
          Version: 3.3.8
          Section: libs
          Priority: optional
          Architecture: amd64
          Maintainer: Build System <build@example.com>
          Description: GLFW Wayland共享库
          EOF

      - name: 构建Debian包
        run: dpkg-deb --build package glfw-wayland.deb

      - name: 验证构建产物
        run: |
          ls -la glfw-wayland.deb
          file glfw-wayland.deb

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: glfw-wayland-软件包
          path: glfw-wayland.deb
          retention-days: 30
