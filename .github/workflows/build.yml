name: Build Linux
on:
  # 触发条件：PR、推送到指定分支或手动触发
  pull_request:
  push:
    branches: [ci, master, latest, 3.3-stable]
  workflow_dispatch:

permissions:
  statuses: write
  contents: read

jobs:
  build-linux-clang:
    name: Linux (Clang)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      CC: clang
      CFLAGS: -Werror
    steps:
      # 检出代码
      - uses: actions/checkout@v4
      
      # 安装Linux图形库依赖和打包工具
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libwayland-dev libxkbcommon-dev
          sudo apt install fakeroot dpkg-dev debhelper

      # 配置Wayland后端共享库
      - name: Configure Wayland shared library
        run: cmake -S . -B build -D GLFW_BUILD_WAYLAND=1 -D BUILD_SHARED_LIBS=ON -D GLFW_BUILD_EXAMPLES=no -D GLFW_BUILD_TESTS=no -D GLFW_BUILD_DOCS=no

      # 编译
      - name: Build Wayland shared library
        run: cmake --build build --parallel

      # 安装到临时目录准备打包
      - name: Install to temp directory
        run: |
          mkdir -p package/usr/local
          DESTDIR=package cmake --install build

      # 创建DEBIAN控制文件
      - name: Create DEBIAN control file
        run: |
          mkdir -p package/DEBIAN
          cat > package/DEBIAN/control << EOF
          Package: glfw-wayland
          Version: 3.3.8
          Section: libs
          Priority: optional
          Architecture: amd64
          Maintainer: Build System <build@example.com>
          Description: GLFW Wayland shared library
          EOF

      # 打包成.deb文件
      - name: Build .deb package
        run: dpkg-deb --build package glfw-wayland.deb

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glfw-wayland-package
          path: glfw-wayland.deb
